<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 페이지 제목 -->
    <title>Happy Birthday Whale!</title>

    <!-- 카카오톡/디스코드/인스타 미리보기 설정 -->
    <meta property="og:title" content="Happy Birthday Whale!" />

    <meta property="og:image" content="https://celestirial.github.io/HBDwhale/whale.jpg" />

    <style>

            background: linear-gradient(180deg, #d6ecff, #ffffff);
            text-align: center;
            color: #333;
        }

        .container {
            padding: 20px;
            max-width: 600px;

        }

        }

        h2 {
            font-size: 20px;

            color: #555;
            margin-bottom: 30px;
        }

            border-radius: 12px;

        }

        .msg {
            margin-top: 30px;
            font-size: 18px;

<body>

        <div class="msg">
            고래야, 생일 정말 축하해!<br>

            이거라도 일단 만들어 바써...<br>
            지짜 지짜 생일 축하하고 <br>
            맛있는 거 많이 먹고 즐거운 하루 보내! <br>
        </div>

        <div class="footer">
            만든 사람: 무너 💙
        </div>
    </div>
</body>
</html>
